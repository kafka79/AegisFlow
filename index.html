    class Store {
      constructor() {
        this.loadState();
        if (this.state.users.length === 0) {
          this.state.users = [
            { email: "admin@odoo.com", password: "admin123", employeeId: "ODIAD20260001", role: "HR" },
            { email: "john.doe@odoo.com", password: "password123", employeeId: "ODIJD20260002", role: "Employee" },
            { email: "alice.smith@odoo.com", password: "password123", employeeId: "ODIAS20260003", role: "Employee" }
          ];
          this.state.employees = INITIAL_EMPLOYEES;
          this.state.attendance = INITIAL_ATTENDANCE;
          this.state.timeOff = INITIAL_LEAVES;
          this.saveState();
        }
      }

      loadState() {
        const data = localStorage.getItem("workforces_state");
        this.state = data ? JSON.parse(data) : {
          users: [],
          employees: [],
          attendance: [],
          timeOff: [],
          currentSession: null // { employeeId, role }
        };
      }

      saveState() {
        localStorage.setItem("workforces_state", JSON.stringify(this.state));
      }

      getCurrentUser() {
        if (!this.state.currentSession) return null;
        return this.state.employees.find(e => e.id === this.state.currentSession.employeeId);
      }

      getEmployee(id) {
        return this.state.employees.find(e => e.id === id);
      }

      updateEmployee(id, updatedFields) {
        const idx = this.state.employees.findIndex(e => e.id === id);
        if (idx !== -1) {
          this.state.employees[idx] = { ...this.state.employees[idx], ...updatedFields };
          this.saveState();
          return true;
        }
        return false;
      }

      addEmployee(emp, password) {
        // Compute serial number for the given joining year
        const year = new Date(emp.dateOfJoining).getFullYear();
        const yearEmps = this.state.employees.filter(e => new Date(e.dateOfJoining).getFullYear() === year);
        // ponytail: randomize to prevent offline collision
        const nextSerial = Math.random().toString(36).substring(2, 6).toUpperCase();
        
        // Extract initials
        const nameParts = emp.name.trim().split(" ");
        const initials = ((nameParts[0]?.[0] || "E") + (nameParts[nameParts.length - 1]?.[0] || "X")).toUpperCase();
        
        const generatedId = `ODI${initials}${year}${nextSerial}`;
        emp.id = generatedId;
        emp.status = "Absent"; // Default status before check-in
        emp.ptoDays = 30;
        emp.sickDays = 15;
        
        this.state.employees.push(emp);
        this.state.users.push({
          email: emp.email,
          password: password,
          employeeId: generatedId,
          role: emp.role
        });
        
        this.saveState();
        return emp;
      }

      getAttendanceToday(empId) {
        const todayStr = getTodayString();
        return this.state.attendance.find(a => a.employeeId === empId && a.date === todayStr);
      }

      checkIn(empId) {
        const todayStr = getTodayString();
        const nowTime = getNowTimeString();
        
        const existing = this.getAttendanceToday(empId);
        if (existing) return existing;

        const newRecord = {
          id: "ATT" + Date.now(),
          employeeId: empId,
          date: todayStr,
          checkIn: nowTime,
          checkOut: "",
          workHours: 0.00,
          extraHours: 0.00,
          status: "Present"
        };
        
        this.state.attendance.push(newRecord);
        this.updateEmployee(empId, { status: "Present" });
        this.saveState();
        return newRecord;
      }

      checkOut(empId) {
        const record = this.getAttendanceToday(empId);
        if (!record || record.checkOut) return record;

        const checkOutTime = getNowTimeString();
        record.checkOut = checkOutTime;

        // Calculate work hours
        const diffMs = parseTimeToMs(checkOutTime) - parseTimeToMs(record.checkIn);
        const hours = parseFloat((diffMs / (1000 * 60 * 60)).toFixed(2));
        record.workHours = hours;
        record.extraHours = hours > 8.00 ? parseFloat((hours - 8.00).toFixed(2)) : 0.00;

        this.saveState();
        return record;
      }

      applyLeave(leaveRequest) {
        leaveRequest.id = "LV" + Date.now();
        leaveRequest.status = "Pending";
        leaveRequest.comment = "";
        this.state.timeOff.push(leaveRequest);
        this.saveState();
      }

      updateLeaveStatus(leaveId, status, comment) {
        const leave = this.state.timeOff.find(l => l.id === leaveId);
        if (leave) {
          leave.status = status;
          leave.comment = comment;
          
          if (status === "Approved") {
            // Deduct from employee leave balances if not unpaid
            const emp = this.getEmployee(leave.employeeId);
            const days = calculateDaysBetween(leave.startDate, leave.endDate);
            if (emp) {
              if (leave.leaveType === "Paid Time Off") {
                emp.ptoDays = Math.max(0, emp.ptoDays - days);
              } else if (leave.leaveType === "Sick Leave") {
                emp.sickDays = Math.max(0, emp.sickDays - days);
              }
              // Set current status if date overlaps today
              const todayStr = getTodayString();
              if (todayStr >= leave.startDate && todayStr <= leave.endDate) {
                emp.status = "Leave";
              }
              this.updateEmployee(emp.id, emp);
            }
          }
          this.saveState();
          return true;
        }
        return false;
      }
    }

    // ==========================================

    function getTodayString() {
      const now = new Date();
      return now.toISOString().split("T")[0];
    }

    function getNowTimeString() {
      const now = new Date();
      return now.toTimeString().split(" ")[0];
    }

    function parseTimeToMs(timeStr) {
      const [h, m, s] = timeStr.split(":").map(Number);
      const d = new Date();
      d.setHours(h, m, s, 0);
      return d.getTime();
    }

    function calculateDaysBetween(start, end) {
      const s = new Date(start);
      const e = new Date(end);
      const diff = e - s;
      return Math.floor(diff / (1000 * 60 * 60 * 24)) + 1;
    }

    function getSalaryBreakdown(wage) {
      const basic = wage * 0.5;
      const hra = basic * 0.4;
      const standard = wage * 0.1;
      const bonus = basic * 0.15;
      const lta = basic * 0.0833;
      const fixed = wage - (basic + hra + standard + bonus + lta);
      
      const employerPf = basic * 0.12;
      const employeePf = basic * 0.12;
      const pt = 200;
      
      const totalDeductions = employeePf + pt;
      const netSalary = wage - totalDeductions;

      return {
        basic, hra, standard, bonus, lta, fixed,
        employerPf, employeePf, pt, totalDeductions, netSalary
      };
    }

    // ==========================================
    // 3. ROUTER & VIEWS SYSTEM
    // ==========================================
    class Router {
      constructor() {
        this.routes = {
          login: () => renderLoginView(),
          signup: () => renderSignupView(),
          dashboard: () => renderDashboardView(),
          employees: () => renderEmployeesView(),
          profile: (params) => renderProfileView(params),
          attendance: () => renderAttendanceView(),
          timeoff: () => renderTimeOffView(),
          payroll: () => renderPayrollView()
        };

        window.addEventListener("hashchange", () => this.handleRoute());
        this.handleRoute();
      }

      navigate(route, params = null) {
        let hash = `#${route}`;
        if (params) {
          hash += `?${new URLSearchParams(params).toString()}`;
        }
        window.location.hash = hash;
      }

      handleRoute() {
        const hash = window.location.hash.substring(1) || "login";
        const [route, queryStr] = hash.split("?");
        const params = queryStr ? Object.fromEntries(new URLSearchParams(queryStr)) : {};

        // Authentication Gate
        const user = store.getCurrentUser();
        if (!user && route !== "login" && route !== "signup") {
          this.navigate("login");
          return;
        } else if (user && (route === "login" || route === "signup")) {
          this.navigate("dashboard");
          return;
        }

        const renderFn = this.routes[route];
        if (renderFn) {
          renderFn(params);
        } else {
          this.navigate("dashboard");
        }
      }
    }

    const router = new Router();

    function showModal(title, bodyHTML) {
      const container = document.getElementById("modal-container");

      const container = document.getElementById("modal-container");

    function handleLoginSubmit(e) {
      e.preventDefault();
      const loginVal = document.getElementById("login-email").value.trim();
      const passVal = document.getElementById("login-password").value;
      const alertDiv = document.getElementById("login-alert");

      const userAccount = store.state.users.find(u => 
        (u.email.toLowerCase() === loginVal.toLowerCase() || u.employeeId.toLowerCase() === loginVal.toLowerCase()) 
        && u.password === passVal
      );

      if (userAccount) {
        store.state.currentSession = {
          employeeId: userAccount.employeeId,
          role: userAccount.role
        };
        store.saveState();
        router.navigate("dashboard");
      } else {
        alertDiv.innerHTML = `
          <div class="alert-banner alert-error">
            <span>Invalid email/login ID or password. Please try again.</span>
          </div>
        `;
      }
    }

    // Dynamic ticking clock helper
    let clockInterval = null;
    function startDashboardClock() {
      if (clockInterval) clearInterval(clockInterval);
      const clockDisp = document.getElementById("clock-display");
      if (!clockDisp) return;
      
      const user = store.getCurrentUser();
      const updateClock = () => {
        const attendanceRecord = store.getAttendanceToday(user.id);
        const isCheckedIn = attendanceRecord && !attendanceRecord.checkOut;
        
        if (isCheckedIn) {
          const checkInMs = parseTimeToMs(attendanceRecord.checkIn);
          const elapsedMs = Date.now() - checkInMs;
          const elapsedSecs = Math.max(0, Math.floor(elapsedMs / 1000));
          const h = Math.floor(elapsedSecs / 3600);
          const m = Math.floor((elapsedSecs % 3600) / 60);
          const s = elapsedSecs % 60;
          clockDisp.textContent = [h, m, s].map(v => String(v).padStart(2, '0')).join(':');
        } else {
          const now = new Date();
          clockDisp.textContent = now.toTimeString().split(" ")[0];
        }
      };
      updateClock();
      clockInterval = setInterval(updateClock, 1000);
    }

    function handleClockTrigger() {
      const user = store.getCurrentUser();
      const attendanceToday = store.getAttendanceToday(user.id);
      const isCheckedIn = attendanceToday && !attendanceToday.checkOut;

      if (!isCheckedIn) {
        store.checkIn(user.id);
      } else {
        store.checkOut(user.id);
      }
      
      // Re-render dashboard
      renderDashboardView();
    }

      const todayStr = getTodayString();

        l.employeeId === emp.id && 
        l.status === "Approved" && 
        todayStr >= l.startDate && 
        todayStr <= l.endDate
      );
      
      if (onLeave) {
        statusClass = "leave";

        const hasCheckedIn = store.state.attendance.some(a => a.employeeId === emp.id && a.date === todayStr);
        if (hasCheckedIn) {

      return `

    function filterEmployees() {
      const query = document.getElementById("employee-search").value.toLowerCase();
      const statusFilter = document.getElementById("employee-filter-status").value;
      const grid = document.getElementById("employee-grid-container");

      const todayStr = getTodayString();
      const filtered = store.state.employees.filter(emp => {
        // Calculate status
        let status = "Absent";
        const onLeave = store.state.timeOff.some(l => 
          l.employeeId === emp.id && 
          l.status === "Approved" && 
          todayStr >= l.startDate && 
          todayStr <= l.endDate
        );
        if (onLeave) {
          status = "Leave";
        } else {
          const checkedIn = store.state.attendance.some(a => a.employeeId === emp.id && a.date === todayStr);
          if (checkedIn) status = "Present";
        }

        const matchesSearch = emp.name.toLowerCase().includes(query) || 
                              emp.id.toLowerCase().includes(query) || 
                              emp.department.toLowerCase().includes(query) ||
                              emp.role.toLowerCase().includes(query);
                              
        const matchesStatus = statusFilter === "all" || status === statusFilter;

        return matchesSearch && matchesStatus;
      });

      grid.innerHTML = filtered.map(emp => getEmployeeCardHTML(emp)).join("");
    }

    function switchProfileTab(e, tabId) {
      // Deactivate other tabs
      const tabs = e.target.parentElement.querySelectorAll(".tab-btn");
      tabs.forEach(btn => btn.classList.remove("active"));
      
      const contents = e.target.parentElement.parentElement.querySelectorAll(".tab-content");
      contents.forEach(cnt => cnt.classList.remove("active"));
      
      e.target.classList.add("active");
      document.getElementById(tabId).classList.add("active");
    }

    function triggerAvatarUpload(empId) {
      const user = store.getCurrentUser();
      if (user.role === "HR" || user.id === empId) {
        document.getElementById("avatar-input").click();
      }
    }

    function handleAvatarChange(e, empId) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(evt) {
        const base64 = evt.target.result;
        store.updateEmployee(empId, { avatar: base64 });
        
        // Refresh image in DOM directly
        const img = document.getElementById("profile-avatar-img");
        if (img) img.src = base64;
      };
      reader.readAsDataURL(file);
    }

      const bankDetails = {

    function handlePasswordUpdate(e, empId) {
      e.preventDefault();
      const current = document.getElementById("current-password").value;
      const newPass = document.getElementById("new-password-input").value;
      const confirm = document.getElementById("confirm-password-input").value;

      const userAccount = store.state.users.find(u => u.employeeId === empId);

      if (userAccount.password !== current) {
        alert("The current password entered is incorrect!");
        return;
      }

      if (newPass.length < 6) {
        alert("New password must be at least 6 characters long.");
        return;
      }

      if (newPass !== confirm) {
        alert("Confirm password does not match the new password.");
        return;
      }

      userAccount.password = newPass;
      store.saveState();
      
      document.getElementById("profile-security-form").reset();
      alert("Credentials security profile updated successfully!");
    }

    function filterAdminAttendance() {
      const dateVal = document.getElementById("attendance-date-search").value;
      const searchVal = document.getElementById("attendance-emp-search").value.toLowerCase();
      const tbody = document.getElementById("attendance-table-body");

      const filtered = store.state.attendance.filter(log => {
        const emp = store.getEmployee(log.employeeId);
        const empName = emp ? emp.name.toLowerCase() : "";
        
        const dateMatch = !dateVal || log.date === dateVal;
        const searchMatch = !searchVal || 
                            log.employeeId.toLowerCase().includes(searchVal) || 
                            empName.includes(searchVal);

        return dateMatch && searchMatch;
      });

      tbody.innerHTML = filtered.map(log => {
        const emp = store.getEmployee(log.employeeId);
        const empName = emp ? emp.name : "Unknown Employee";
        return `
          <tr>
            <td><strong>${log.date}</strong></td>
            <td style="font-family: var(--font-mono); font-size: 0.85rem;">${log.employeeId}</td>
            <td>${empName}</td>

            <td>${log.checkOut || '--:--'}</td>
            <td>${log.workHours ? `${log.workHours} hrs` : '--:--'}</td>
            <td>${log.extraHours ? `${log.extraHours} hrs` : '--:--'}</td>
            <td><span class="status-badge approved">${log.status}</span></td>
          </tr>
        `;
      }).join("") || `
        <tr>
          <td colspan="8" style="text-align: center; color: var(--text-muted); padding: 32px;">
            No matching attendance records found.
          </td>
        </tr>
      `;
    }

    function renderCalendarDays(year, month) {
      const user = store.getCurrentUser();
      const days = [];
      const todayStr = getTodayString();
      
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const startDayOfWeek = new Date(year, month, 1).getDay();
      
      for (let i = 0; i < startDayOfWeek; i++) {
        days.push(`<div class="calendar-day empty"></div>`);
      }

      const monthStr = String(month + 1).padStart(2, "0");
      
      for (let day = 1; day <= daysInMonth; day++) {
        const dayStr = `${year}-${monthStr}-${String(day).padStart(2, "0")}`;
        
        let dayClass = "";
        
        // Status checks
        const onApprovedLeave = store.state.timeOff.some(l => 
          l.employeeId === user.id && 
          l.status === "Approved" && 
          dayStr >= l.startDate && 
          dayStr <= l.endDate
        );

        if (onApprovedLeave) {
          dayClass = "leave-day";
        } else {
          // Check in check
          const att = store.state.attendance.find(a => a.employeeId === user.id && a.date === dayStr);
          if (att) {
            dayClass = "present-day";
          } else if (dayStr < todayStr) {
            // Unmarked past weekday is Absent
            const dateObj = new Date(dayStr);
            const isWeekend = dateObj.getDay() === 0 || dateObj.getDay() === 6;
            if (!isWeekend) {
              dayClass = "absent-day";
            }
          }
        }

        const isToday = dayStr === todayStr;

        days.push(`
          <div class="calendar-day ${dayClass} ${isToday ? 'today' : ''}">
            <span class="calendar-day-num">${day}</span>
            ${dayClass ? '<span class="calendar-day-marker"></span>' : ''}
          </div>
        `);
      }
      return days.join("");
    }

    function calculateRequestedDays() {
      const start = document.getElementById("leave-start").value;
      const end = document.getElementById("leave-end").value;
      const disp = document.getElementById("leave-days-display");
      if (start && end) {
        if (end < start) {
          disp.value = "Invalid Range";
          return;
        }
        const days = calculateDaysBetween(start, end);
        disp.value = `${days} Day${days > 1 ? 's' : ''}`;
      }
    }

    function handleLeaveSubmit(e) {
      e.preventDefault();
      const user = store.getCurrentUser();
      
      const lType = document.getElementById("leave-type").value;
      const start = document.getElementById("leave-start").value;
      const end = document.getElementById("leave-end").value;
      const remarks = document.getElementById("leave-remarks").value.trim();
      const fileEl = document.getElementById("leave-file");

      if (end < start) {
        alert("End Date cannot be before Start Date.");
        return;
      }

      const days = calculateDaysBetween(start, end);

      if (lType === "Paid Time Off" && user.ptoDays < days) {
        alert(`Insufficient Paid Time Off balance! You have only ${user.ptoDays} days available.`);
        return;
      }
      if (lType === "Sick Leave" && user.sickDays < days) {
        alert(`Insufficient Sick Leave balance! You have only ${user.sickDays} days available.`);
        return;
      }

      // Check file upload requirement for sick leave
      if (lType === "Sick Leave" && fileEl.files.length === 0) {
        alert("Sick Leave requires a medical certificate upload.");
        return;
      }

      const leaveData = {
        employeeId: user.id,
        employeeName: user.name,
        leaveType: lType,
        startDate: start,
        endDate: end,
        remarks: remarks,
        attachmentName: "",
        attachmentData: ""
      };

      if (fileEl.files.length > 0) {
        const file = fileEl.files[0];
        leaveData.attachmentName = file.name;

        const reader = new FileReader();
        reader.onload = function(evt) {
          leaveData.attachmentData = evt.target.result;
          store.applyLeave(leaveData);
          closeModal();
          renderTimeOffView();
        };
        reader.readAsDataURL(file);
      } else {
        store.applyLeave(leaveData);
        closeModal();
        renderTimeOffView();
      }
    }

    function calculateMonthlyPayroll(emp, targetYear = new Date().getFullYear(), targetMonth = new Date().getMonth()) {
      const today = getTodayString();
      const monthDays = new Date(targetYear, targetMonth + 1, 0).getDate();
      const monthStr = String(targetMonth + 1).padStart(2, "0");
      const yearMonthPrefix = `${targetYear}-${monthStr}-`;
      
      let absentDays = 0;
      let unpaidLeaveDays = 0;
      
      for (let d = 1; d <= monthDays; d++) {
        const dStr = `${yearMonthPrefix}${String(d).padStart(2, "0")}`;
        
        // Don't check days in future
        if (dStr > today) continue;

        // Check if on leave
        const leave = store.state.timeOff.find(l => 
          l.employeeId === emp.id && 
          l.status === "Approved" && 
          dStr >= l.startDate && 
          dStr <= l.endDate
        );

        if (leave) {
          if (leave.leaveType === "Unpaid Leave") {
            unpaidLeaveDays++;
          }
        } else {
          // Check attendance
          const att = store.state.attendance.find(a => a.employeeId === emp.id && a.date === dStr);
          if (!att) {
            // If weekday, it is absent
            const dateObj = new Date(dStr);
            const dayOfWeek = dateObj.getDay();
            if (dayOfWeek !== 0 && dayOfWeek !== 6) {
              absentDays++;
            }
          }
        }
      }

      // Total payable days
      const totalAbsences = absentDays + unpaidLeaveDays;
      const payableDays = Math.max(0, monthDays - totalAbsences);

      const bd = getSalaryBreakdown(emp.wage);
      const perDayWage = emp.wage / monthDays;
      
      const unpaidDeduction = perDayWage * totalAbsences;
      const payout = Math.max(0, bd.netSalary - unpaidDeduction);

      return {
        payableDays,
        payout: Math.round(payout),
        unpaidDeduction: Math.round(unpaidDeduction),
        monthDays,
        breakdown: {
          basic: Math.round(bd.basic),
          hra: Math.round(bd.hra),
          standard: Math.round(bd.standard),
          bonus: Math.round(bd.bonus),
          lta: Math.round(bd.lta),
          fixed: Math.round(bd.fixed),
          employerPf: Math.round(bd.employerPf),
          employeePf: Math.round(bd.employeePf),
          pt: Math.round(bd.pt),
          totalDeductions: Math.round(bd.totalDeductions),
          netSalary: Math.round(bd.netSalary)
        }
      };
    }

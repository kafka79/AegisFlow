global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'workforces-demo'
    environment: 'local'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'workforces-app'
    static_configs:
      - targets: ['app:3000']
    metrics_path: '/metrics'
